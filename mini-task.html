<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.9);
            --color-success: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 15px;
            font-size: 14px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px;
        }
        .header h3 { font-size: 16px; font-weight: 600; }
        .task-list { display: flex; flex-direction: column; gap: 10px; }
        .task-item {
            background: var(--card-bg); padding: 12px; border-radius: 8px;
            display: flex; align-items: center; gap: 12px; border: 1px solid #334155;
            transition: all 0.2s;
        }
        .task-item:hover { border-color: #475569; }
        .task-item.done { opacity: 0.5; }
        .task-item.done .title { text-decoration: line-through; }
        .checkbox {
            width: 22px; height: 22px; border: 2px solid var(--text-secondary); 
            border-radius: 6px; appearance: none; cursor: pointer; position: relative;
            flex-shrink: 0;
        }
        .checkbox:checked { background: var(--color-success); border-color: var(--color-success); }
        .checkbox:checked::after {
            content: ''; position: absolute; top: 2px; left: 6px; width: 4px; height: 10px; 
            border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg);
        }
        .title { flex: 1; font-weight: 500; font-size: 15px; }
        .time { font-size: 12px; color: var(--text-secondary); background: #1e293b; padding: 4px 8px; border-radius: 4px; }
        .btn-refresh { 
            background: #3b82f6; border: none; color: white; padding: 6px 12px; 
            border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
        }
        .btn-refresh:hover { background: #2563eb; }
        .hint { margin-top: 20px; font-size: 12px; color: var(--text-secondary); text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h3 id="date-title">Hôm nay</h3>
        <button class="btn-refresh" onclick="syncWithAPI()">🔄 Làm mới</button>
    </div>
    <div class="task-list" id="task-list">
        <!-- Tasks will be injected here -->
    </div>
    <div class="hint">
        💡 Mẹo: Nhấn Install (Cài đặt) trên thanh địa chỉ trình duyệt để tách thành cửa sổ Widget độc lập.
    </div>

    <script>
        const DAILY_STORAGE_KEY = 'daily_tasks';
        const DAILY_API_URL = 'https://script.google.com/macros/s/AKfycbxl3nA-4xepVUE-DCMKPBUO-d_97a4FjtfDFn2V4Iv6NxzUE0BQzQe9YjLbv0iZqUXw/exec';

        async function syncWithAPI() {
            try {
                document.querySelector('.btn-refresh').innerText = '⏳ Đang tải...';
                const response = await fetch(DAILY_API_URL);
                const data = await response.json();
                if (data && !data.error && !data.status) {
                    localStorage.setItem(DAILY_STORAGE_KEY, JSON.stringify(data));
                    renderTasks();
                }
            } catch (e) {
                console.error("API error", e);
            } finally {
                document.querySelector('.btn-refresh').innerText = '🔄 Làm mới';
            }
        }

        async function pushToAPI() {
            const stored = localStorage.getItem(DAILY_STORAGE_KEY);
            if (!stored) return;
            try {
                await fetch(DAILY_API_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: stored
                });
            } catch (e) {}
        }
        
        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        
        function renderTasks() {
            const listEl = document.getElementById('task-list');
            listEl.innerHTML = '';
            
            const d = new Date();
            document.getElementById('date-title').innerText = `Ngày ${d.getDate()}/${d.getMonth()+1}`;
            
            const stored = localStorage.getItem(DAILY_STORAGE_KEY);
            let dailyTasks = stored ? JSON.parse(stored) : {};
            let todayTasks = dailyTasks[getTodayString()] || [];
            
            todayTasks.sort((a, b) => (a.startTime || '24:00').localeCompare(b.startTime || '24:00'));
            
            if (todayTasks.length === 0) {
                listEl.innerHTML = '<p style="color: #94a3b8; text-align: center;">Bạn chưa có công việc nào hôm nay.</p>';
                return;
            }
            
            todayTasks.forEach(task => {
                let timeStr = task.startTime ? `${task.startTime}` : '--:--';
                const html = `
                    <div class="task-item ${task.done ? 'done' : ''}">
                        <input type="checkbox" class="checkbox" ${task.done ? 'checked' : ''} onclick="toggleDone('${task.id}')">
                        <span class="time">${timeStr}</span>
                        <span class="title">${task.title}</span>
                    </div>
                `;
                listEl.insertAdjacentHTML('beforeend', html);
            });
        }
        
        window.toggleDone = function(id) {
            const stored = localStorage.getItem(DAILY_STORAGE_KEY);
            let dailyTasks = stored ? JSON.parse(stored) : {};
            const today = getTodayString();
            
            if (dailyTasks[today]) {
                const task = dailyTasks[today].find(t => t.id === id);
                if (task) {
                    task.done = !task.done;
                    localStorage.setItem(DAILY_STORAGE_KEY, JSON.stringify(dailyTasks));
                    renderTasks();
                    pushToAPI(); // Đẩy lên Google Sheets
                }
            }
        };
        
        // Listen for storage changes from Dashboard tab
        window.addEventListener('storage', (e) => {
            if (e.key === DAILY_STORAGE_KEY) {
                renderTasks();
            }
        });
        
        renderTasks();
        syncWithAPI(); // Tải API tự động khi mở Widget

        // Đăng ký Service Worker để Chrome cho phép Install PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.error('SW Registration Failed', err));
            });
        }
    </script>
</body>
</html>
