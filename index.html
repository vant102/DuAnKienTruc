<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <div class="header-main">
                <div class="title-group">
                    <img src="logo.jpg" alt="Logo cá nhân" class="site-logo">
                    <h1>My Progress Board</h1>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-target="project-working">Project Working</button>
                    <button class="tab-btn" data-target="study-plan">Study Plan</button>
                    <button class="tab-btn" data-target="all-projects">All Project</button>
                </div>
            </div>
            <div class="header-actions">
                <a href="https://docs.google.com/spreadsheets/d/1Nhk9Ai2b9tlAGwmznYmqQ_siVDmf7AIqXfBvXJ0X4Z0/edit?gid=8436140#gid=8436140" target="_blank" class="btn btn-update">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    Update Progress
                </a>
            </div>
        </header>

        <main>
            <section id="project-working" class="tab-content active">
                <div class="board-header">
                    <h2>Dự án đang thực hiện</h2>
                    <div class="status-legend">
                        <span class="badge status-hoanthanh">Hoàn thành</span>
                        <span class="badge status-dangthicong">Đang thi công</span>
                        <span class="badge status-trienkhai">Triển khai</span>
                        <span class="badge status-phuongan">Phương án</span>
                        <span class="badge status-tamdung">Tạm dừng</span>
                    </div>
                </div>
                <div class="grid-container" id="project-grid">
                    <!-- Cards will be injected here by JS -->
                </div>
            </section>

            <section id="study-plan" class="tab-content">
                <div class="board-header">
                    <h2>Kế hoạch học tập</h2>
                    <div class="status-legend">
                        <span class="badge status-hoanthanh">Đã hoàn thành</span>
                        <span class="badge status-dangthicong">Đang học</span>
                        <span class="badge status-phuongan">Chuẩn bị</span>
                        <span class="badge status-tamdung">Tạm dừng</span>
                    </div>
                </div>
                <div class="grid-container" id="study-grid">
                    <!-- Cards will be injected here by JS -->
                </div>
            </section>

            <section id="all-projects" class="tab-content">
                <div class="board-header">
                    <h2>All Project</h2>
                    <div class="filters">
                        <input type="text" id="searchKeyword" class="filter-input" placeholder="Tìm tên, địa điểm...">
                        <select id="filterNam" class="filter-input"><option value="">Tất cả năm</option></select>
                        <select id="filterTheLoai" class="filter-input"><option value="">Tất cả thể loại</option></select>
                        <select id="filterTrangThai" class="filter-input"><option value="">Tất cả trạng thái</option></select>
                    </div>
                </div>
                <div class="grid-container library-grid" id="library-grid">
                    <!-- Cards will be injected here by JS -->
                </div>
            </section>
        </main>
    </div> <!-- Kết thúc container -->

    <!-- Glass Modal -->
    <div id="details-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button class="modal-close" onclick="closeModal(event)">&times;</button>
            <div class="modal-header">
                <h2 id="modal-title">Chi tiết</h2>
            </div>
            <div class="modal-body" id="modal-body">
                <div id="modal-info" class="modal-info-grid"></div>
                <div id="modal-gallery" class="modal-gallery"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox for Fullscreen Image Viewing -->
    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox(event)">&times;</span>
        <button class="lightbox-prev" onclick="changeLightboxImage(-1, event)">&#10094;</button>
        <img id="lightbox-img" class="lightbox-img" src="">
        <button class="lightbox-next" onclick="changeLightboxImage(1, event)">&#10095;</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
